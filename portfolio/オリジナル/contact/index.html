<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex , nofollow">
    <title>Chatan Coffee | 自然の恵みとコーヒーでリラックスできる空間を提供</title>
    <link rel="stylesheet" type="text/css" href="http://yui.yahooapis.com/3.18.1/build/cssreset/cssreset-min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.7.1/css/lightbox.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.7.1/js/lightbox.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="header-inner">
            <h1 class="site-title"><a href="../index.html">Chatan Coffee</a></h1>
            <nav class="header-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="../news/index.html">News</a></li>
                    <li class="nav-item"><a href="../menu/index.html">Menu</a></li>
                    <li class="nav-item"><a href="../contact/index.html">Contact</a></li>
                </ul>
            </nav>
            <button class="burger-btn">
                <span class="bar bar_top"></span>
                <span class="bar bar_mid"></span>
                <span class="bar bar_bottom"></span>
            </button>
        </div>
    </header>
        <!-- //header -->

    <!-- main -->
    <main>
        <!-- page-title -->
        <div class="page-title-wrapper fv">
            <h1 class="page-title">Contact</h1>
        </div>
        <!-- //page-title -->
        <!-- form -->
        <form action="" class="form-wrapper">
            <ul class="form-list">
                <li class="form-item">
                    <label for="" class="form-label">お問い合わせ内容</label>
                    <ul class="checkbox-list">
                        <li class="checkbox-item">
                            <input type="checkbox" class="checkbox" id="document">
                            <label for="document">予約</label>
                        </li>
                        <li class="checkbox-item">
                            <input type="checkbox" class="checkbox" id="application">
                            <label for="application">ご意見</label>
                        </li>
                        <li class="checkbox-item">
                            <input type="checkbox" class="checkbox" id="phone">
                            <label for="phone">お電話でのご相談を希望</label>
                        </li>
                    </ul>
                </li>
                <li class="form-item">
                    <label for="" class="form-label">氏名</label>
                    <input type="text" class="input-text">
                </li>
                <li class="form-item">
                    <label for="" class="form-label">電話番号</label>
                    <input type="text" class="input-text">
                </li>
                <li class="form-item">
                    <label for="" class="form-label">メールアドレス</label>
                    <input type="text" class="input-text">
                </li>
                <li class="form-item">
                    <label for="" class="form-label">その他</label>
                    <textarea name="" id="" cols="30" rows="10"></textarea>
                </li>
        </ul>
        <input type="submit" value="Submit" class="submit-btn">
        </form>
        <!-- //form -->

    </main>
    <!-- //main -->
        
        <!-- footer -->
        <footer class="footer">
            <small>&copy;louis.Chatac Coffee original</small>
        </footer>
        <!-- //footer -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
